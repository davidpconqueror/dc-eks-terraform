---
apiVersion: v1
kind: Secret
metadata:
  name: rds-mysql-secret
  namespace: webapps
type: Opaque
stringData:
  SPRING_DATASOURCE_USERNAME: root
  SPRING_DATASOURCE_PASSWORD: "123456789"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rds-mysql-config
  namespace: webapps
data:
  SPRING_DATASOURCE_URL: jdbc:mysql://rds-mysql:3306/bankappdb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true

---
apiVersion: v1
kind: Service
metadata:
  name: rds-mysql
  namespace: webapps
spec:
  type: ExternalName
  externalName: techpilotz-mysql-db.cvsy8coe8pbb.ap-south-1.rds.amazonaws.com
  ports:
    - port: 3306

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bankapp
  namespace: webapps
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bankapp
  template:
    metadata:
      labels:
        app: bankapp
    spec:
      imagePullSecrets:
        - name: dockerhub-cred
      initContainers:
        - name: init-create-db
          image: mysql:8
          command:
            - sh
            - -c
            - mysql -h rds-mysql -u root -p"$MYSQL_ROOT_PASSWORD" -e "CREATE DATABASE IF NOT EXISTS bankappdb;"
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-mysql-secret
                  key: SPRING_DATASOURCE_PASSWORD
      containers:
        - name: bankapp
          image: techpilotz/bankapp:latest
          resources:
            requests:
              memory: 180Mi
              cpu: 150m
            limits:
              memory: 320Mi
              cpu: 300m
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: rds-mysql-config
                  key: SPRING_DATASOURCE_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: rds-mysql-secret
                  key: SPRING_DATASOURCE_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rds-mysql-secret
                  key: SPRING_DATASOURCE_PASSWORD
          livenessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /login
              port: 8080
            initialDelaySeconds: 60
            timeoutSeconds: 5
            periodSeconds: 10
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: bankapp-service
  namespace: webapps
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: bankapp
